name: Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      
      - name: Add assetlinks
        run: mkdir -p .well-known && cp assetlinks.json .well-known/

      - uses: actions/configure-pages@v5
      
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          
      - run: cp -r .well-known ./_site/
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
          
      - uses: actions/deploy-pages@v4
